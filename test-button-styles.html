<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Styles Test</title>
    <style>
        /* Basic CSS custom properties for testing */
        :root {
            --brand: #c7a17a;
            --brand-2: #e7d7c9;
            --brand-hover: #b89168;
            --brand-subtle: rgba(199, 161, 122, 0.1);
            --text: #1a1a1a;
            --bg: #ffffff;
            --bg-secondary: #f8f8f8;
            --bg-tertiary: #f0f0f0;
            --border: #e5e5e5;
            --border-hover: #d0d0d0;
            --focus-ring: rgba(199, 161, 122, 0.3);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-brand: 0 8px 24px rgba(199, 161, 122, 0.2);
            --transition-theme: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        :root.dark {
            --text: #f7f7f7;
            --bg: #0c0c0c;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --border: #262626;
            --border-hover: #3a3a3a;
            --brand-hover: #d4b08c;
            --focus-ring: rgba(199, 161, 122, 0.4);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --shadow-brand: 0 8px 24px rgba(199, 161, 122, 0.3);
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px;
            transition: var(--transition-theme);
        }

        .test-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--brand);
            color: #111;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
    
    <h1>Button Styles Test</h1>
    
    <div class="test-section">
        <h2>Primary Buttons</h2>
        <div class="button-grid">
            <button class="btn">Primary Button</button>
            <button class="btn" disabled>Disabled Button</button>
            <button class="btn btn--loading">Loading Button</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Button Variants</h2>
        <div class="button-grid">
            <button class="btn btn--ghost">Ghost Button</button>
            <button class="btn btn--outline">Outline Button</button>
            <button class="btn btn--light">Light Button</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Focus States (Tab to test)</h2>
        <div class="button-grid">
            <button class="btn">Focus Test 1</button>
            <button class="btn btn--ghost">Focus Test 2</button>
            <button class="btn btn--outline">Focus Test 3</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Add some interactivity for testing
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!this.disabled && !this.classList.contains('btn--loading')) {
                    console.log('Button clicked:', this.textContent);
                }
            });
        });
    </script>

    <!-- Include the actual button styles from globals.css -->
    <style>
        /* Button Components - Theme-Aware Luxury Design */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #111;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid var(--brand-subtle);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition-theme), transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            min-height: 44px;
            line-height: 1.4;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--brand-hover), var(--brand));
            opacity: 0;
            transition: opacity 0.2s ease;
            border-radius: inherit;
        }

        .btn:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow: var(--shadow-brand);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring), var(--shadow-brand);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            transition: transform 0.1s ease;
        }

        .btn > * {
            position: relative;
            z-index: 1;
        }

        /* Button Variants */
        .btn--ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn--ghost::before {
            background: var(--bg-tertiary);
        }

        .btn--ghost:hover {
            color: var(--brand);
            border-color: var(--border-hover);
            box-shadow: var(--shadow);
        }

        .btn--ghost:focus {
            border-color: var(--brand);
            color: var(--brand);
            box-shadow: 0 0 0 3px var(--focus-ring), var(--shadow);
        }

        .btn--outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn--outline::before {
            background: var(--brand-subtle);
        }

        .btn--outline:hover {
            color: var(--brand);
            border-color: var(--brand);
            box-shadow: var(--shadow);
        }

        .btn--outline:focus {
            border-color: var(--brand);
            color: var(--brand);
            box-shadow: 0 0 0 3px var(--focus-ring), var(--shadow);
        }

        .btn--light {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn--light::before {
            background: var(--bg-secondary);
        }

        .btn--light:hover {
            color: var(--brand);
            border-color: var(--border-hover);
            box-shadow: var(--shadow);
        }

        .btn--light:focus {
            border-color: var(--brand);
            color: var(--brand);
            box-shadow: 0 0 0 3px var(--focus-ring), var(--shadow);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            transform: none;
        }

        .btn:disabled::before {
            display: none;
        }

        .btn--loading {
            color: transparent;
            pointer-events: none;
        }

        .btn--loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: btn-spin 0.8s linear infinite;
            color: #111;
        }

        .btn--ghost.btn--loading::after,
        .btn--outline.btn--loading::after,
        .btn--light.btn--loading::after {
            color: var(--brand);
        }

        @keyframes btn-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>
</html>
